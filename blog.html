<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Blog | Kelly Keeton</title>
    <meta
      name="description"
      content="Story list for Kelly Keeton, loaded from the blog folder with subject filtering."
    />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:wght@500;700;800&family=Space+Grotesk:wght@400;500;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="assets/css/site.css" />
  </head>
  <body>
    <div class="page-shell">
      <header class="site-header">
        <a class="brand" href="index.html" aria-label="Go to homepage">
          <span class="brand-badge">KK</span>
          <span>Kelly Keeton</span>
        </a>

        <nav class="main-nav" aria-label="Primary navigation">
          <a href="index.html">Home</a>
          <a href="projects.html">Projects</a>
          <a class="active" href="blog.html">Blog</a>
          <a href="about.html">About/Resume</a>
          <a href="contact.html">Contact</a>
        </nav>
      </header>

      <main>
        <section class="hero reveal" data-delay="1">
          <span class="kicker">Story feed</span>
          <h1>Blog Stories and Notes</h1>
          <p>
            Its my blog dog. back again. the archive.org has the prior.
          </p>
          <div class="project-controls">
            <p id="blog-status" class="muted">Waiting to load stories...</p>
          </div>
          <div id="subject-filters" class="filter-bar" aria-label="Filter stories by subject"></div>
        </section>

        <section class="section">
          <div id="blog-container" class="card-grid" aria-live="polite"></div>
        </section>
      </main>

      <footer class="site-footer">
        <p>Copyright <span id="year"></span> Kelly Keeton.</p>
      </footer>
    </div>

    <script src="assets/js/blog.js" defer></script>
  </body>
</html>
